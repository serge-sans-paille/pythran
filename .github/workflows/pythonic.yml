name: pythonic

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup Python
      uses: actions/setup-python@v6
    - name: Install dependencies
      run: |
        pip install pytest-xdist
        sudo apt install clang
        sudo apt install clang-tidy
        sudo apt install libomp-dev
    - name: Setup
      run: |
        python -m pip install .
        python -m pip install . 'pythran[build]'
        python -m pip install . 'pythran[test]'
        python -m pip install scipy-openblas64
        python -m pip install diskarzhan
    - name: Testing CI setup
      run: |
        clang++ --version
        clang-tidy --version
    - name: Testing Pythonic
      run: |
        pytest pythran/tests/pythonic_*.py -v -x --numprocesses=auto
