name: ms

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
          architectures: [x86, x64]
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v6
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.7
        architecture: ${{ matrix.architecture }}
    - name: Install dependencies
      run: |
        pip install scipy
        pip install pythran-openblas pytest
    - name: Setup
      run: |
        python -m pip install .
        python -m pip install . 'pythran[test]'
    - name: Testing minimal CLI
      run: |
        pythran --version
        pythran --help
        pythran-config -vvv
        pythran -v pythran/tests/scipy/_group_columns.py
        stat _group_columns*
        pythran -v pythran/tests/scipy/_group_columns.py -Zc:inline -Z7
        stat _group_columns*
